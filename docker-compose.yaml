version: '3.8'

services:
  frontend:
    build: ./frontend
    image: tfrontend
    ports:
      - "80:80"
    networks:
      - dcompose
    environment:
      - API_URL=http://backend:8080/api/items

  backend:
    build: ./backend
    image: tbackend
    ports:
      - "8080:8080"
    networks:
      - dcompose

networks:
  dcompose:
    driver: bridge
